<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <input type="hidden" id="activeCoId" value="{{ co.id }}">

    <div class="no-print">
        <nav class="navbar navbar-dark bg-dark px-3">
            <span class="navbar-brand fw-bold">TITAN V3</span>
            <select class="form-select w-auto">
                {% for c in all_cos %}
                <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </nav>

        <div class="container mt-3">
            <div class="row g-2">
                <div class="col-6"><div class="stat-card bg-primary">Rev: ₹{{ stats.revenue }}</div></div>
                <div class="col-6"><div class="stat-card bg-success">Profit: ₹{{ stats.profit }}</div></div>
            </div>
        </div>
    </div>

    <div class="container main-billing mt-3">
        <div class="d-flex justify-content-between border-bottom pb-2 mb-3">
            <div><h3>{{ co.name }}</h3><small>{{ co.addr }}</small></div>
            <div class="text-end"><h5>{{ co.prefix }}-{{ co.counter }}</h5><p id="billDate"></p></div>
        </div>

        <div class="row g-2 mb-3 no-print">
            <div class="col-4"><select id="bType" class="form-select"><option>Table</option><option>Room</option><option>Parcel</option></select></div>
            <div class="col-4"><input type="text" id="refNo" class="form-control" placeholder="No."></div>
            <div class="col-4"><input type="text" id="cName" class="form-control" placeholder="Customer"></div>
        </div>

        <div class="no-print mb-3">
            <h6>Fast Add Items:</h6>
            <div class="d-flex flex-wrap gap-2">
                {% for item in co.items %}
                <button class="btn btn-outline-dark btn-sm" onclick="addItem('{{item.name}}', {{item.price}}, {{item.cost}})">
                    {{item.name}}
                </button>
                {% endfor %}
            </div>
        </div>

        <table class="table table-sm border" id="billTable">
            <thead class="table-light"><tr><th>Item</th><th>Rate</th><th>Qty</th><th>Total</th></tr></thead>
            <tbody></tbody>
        </table>

        <div class="text-end mt-3">
            <p class="mb-0">Disc: <input type="number" id="disc" class="no-print" value="0" oninput="calculateTotal()" style="width:60px"> </p>
            <h2 class="fw-bold">Net: ₹<span id="gTotal">0</span></h2>
        </div>

        <div class="row g-2 mt-3 no-print">
            <div class="col-4"><select id="pay" class="form-select"><option>Cash</option><option>UPI</option></select></div>
            <div class="col-8"><button class="btn btn-danger w-100 fw-bold" onclick="saveBill()">SAVE & PRINT</button></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
